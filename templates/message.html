{% extends "base.html" %}
{% block title %}Email{% endblock %}

{% block content %}

<div class="card card-resort p-4">

  <div class="mb-3">

    <div class="fw-semibold">
      📩 {{ message.subject or "Email" }}
    </div>

    <div class="small text-secondary">
      Resort: {{ message.resort_name }}
    </div>

    <div class="small text-secondary">
      Inserita da {{ message.user_name }}
      · {{ message.created_at.strftime('%d/%m/%Y %H:%M') }}
    </div>

  </div>

  <hr>

  <div class="p-3 bg-light rounded small"
       style="white-space: pre-line; line-height:1.5;">
    {{ message.body }}
  </div>

  <div class="mt-4">

    <a class="btn btn-outline-secondary btn-sm btn-pill"
       href="{{ url_for('view_resort', resort_id=message.resort_id) }}">
       Torna al resort
    </a>

  </div>

</div>

{% endblock %}
