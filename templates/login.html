<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accesso - Resort Accessibili</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #6f42c1 0%, #0d6efd 100%);
    }
    .login-card {
      border: 0;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,.15);
    }
    .btn-pill {
      border-radius: 999px;
    }
  </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

  <div class="card login-card p-4" style="width:380px;">
    
    <div class="text-center mb-4">
      <div class="fs-4 fw-semibold">Resort Accessibili</div>
      <div class="text-muted small">Seleziona il tuo nome</div>
    </div>

    <form method="post">
      {% for f in friends %}
        <button type="submit"
                name="name"
                value="{{ f }}"
                class="btn btn-outline-primary w-100 mb-2 btn-pill">
          {{ f }}
        </button>
      {% endfor %}
    </form>

  </div>

</body>
</html>
