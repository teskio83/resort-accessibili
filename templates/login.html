<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accesso – Resort Accessibili</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #6f42c1, #0d6efd);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }

    .brand-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      background: #6f42c1;
      margin-right: 8px;
    }

    .btn-pill {
      border-radius: 999px;
    }
  </style>
</head>

<body>

  <div class="login-card text-center">
    <div class="mb-4">
      <h4 class="fw-semibold">
        <span class="brand-dot"></span>
        Resort Accessibili
      </h4>
      <div class="text-muted small">Accesso amici</div>
    </div>

    <form method="post">
      <div class="mb-3">
        <select name="name" class="form-select" required>
          <option value="">Seleziona il tuo nome</option>
          {% for f in friends %}
            <option value="{{ f }}">{{ f }}</option>
          {% endfor %}
        </select>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-pill">
        Entra
      </button>
    </form>

  </div>

</body>
</html>
