<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f5f7fb; }
    .app-shell { max-width: 1100px; margin: 0 auto; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(245,247,251,.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(0,0,0,.06);
    }
    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      background: #6f42c1;
    }
    .btn-pill { border-radius: 999px; }
    .muted { color: #6c757d; }
  </style>
</head>

<body>

  <div class="topbar py-3">
    <div class="app-shell px-3 d-flex justify-content-between align-items-center">

      <div class="fw-semibold">
        <span class="brand-dot"></span>
        Resort Accessibili
      </div>

      {% if session.get("user") %}
        <div class="d-flex align-items-center gap-3">
          <span class="small muted">
            👤 {{ session.get("user") }}
          </span>
          <a href="{{ url_for('logout') }}" class="btn btn-outline-secondary btn-sm btn-pill">
            Logout
          </a>
        </div>
      {% endif %}

    </div>
  </div>

  <main class="app-shell px-3 py-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
